# Tab bar — absolutely positioned at the bottom of the screen.
# Each tab button is at x = col * 80, filling the full 480px width.
# Sits in the LVGL top_layer so it persists across all pages.
obj:
  x: 0
  y: 430
  width: 480
  height: 50
  bg_color: $color_bg
  border_width: 0
  pad_all: 0
  radius: 0

  widgets:
    - obj:
        x: 0
        y: 0
        width: 80
        height: 50
        bg_opa: 0
        border_width: 0
        pad_all: 4
        widgets:
          - button:
              width: 100%
              height: 100%
              radius: 12
              border_width: 0
              bg_color: $color_surface
              pad_all: 0
              on_click:
                - lvgl.page.show: page_1
              widgets:
                - label:
                    align: center
                    text: "1"

