# Tab bar — absolutely positioned at the bottom of the screen.
# Each tab button is at x = col * 80, filling the full 480px width.
# Sits in the LVGL top_layer so it persists across all pages.
obj:
  x: 0
  y: 430
  width: 480
  height: 50
  bg_color: $color_bg
  border_width: 0
  pad_all: 0
  radius: 0

  widgets:
    - obj:
        x: 0
        y: 0
        width: 80
        height: 50
        bg_opa: 0
        border_width: 0
        pad_all: 4
        widgets:
          - button:
              id: tab_btn_1
              width: 100%
              height: 100%
              radius: 12
              border_width: 0
              bg_color: $color_primary
              pad_all: 0
              on_click:
                - lvgl.page.show: page_1
                - lvgl.widget.update:
                    id: tab_btn_1
                    bg_color: $color_primary
                - lvgl.widget.update:
                    id: tab_label_1
                    text_color: $color_icon_on
                - lvgl.widget.update:
                    id: tab_btn_2
                    bg_color: $color_surface
                - lvgl.widget.update:
                    id: tab_label_2
                    text_color: $color_text_muted
                - lvgl.widget.update:
                    id: tab_btn_3
                    bg_color: $color_surface
                - lvgl.widget.update:
                    id: tab_label_3
                    text_color: $color_text_muted
                - lvgl.widget.update:
                    id: tab_btn_4
                    bg_color: $color_surface
                - lvgl.widget.update:
                    id: tab_label_4
                    text_color: $color_text_muted
                - lvgl.widget.update:
                    id: tab_btn_5
                    bg_color: $color_surface
                - lvgl.widget.update:
                    id: tab_label_5
                    text_color: $color_text_muted
                - lvgl.widget.update:
                    id: tab_btn_6
                    bg_color: $color_surface
                - lvgl.widget.update:
                    id: tab_label_6
                    text_color: $color_text_muted
              widgets:
                - label:
                    id: tab_label_1
                    align: center
                    text_color: $color_icon_on
                    text: "1"

    - obj:
        x: 80
        y: 0
