# Tab bar — no flex layout. Each tab button is absolutely positioned at x = col * 80.
# This eliminates the inter-item gap that flex adds by default, which was
# pushing tab 6 off the right edge of the screen.
obj:
  grid_cell_row_pos: 0
  grid_cell_column_pos: 0
  grid_cell_y_align: stretch
  width: 480
  bg_color: 0x000000
  border_width: 0
  pad_all: 0
  radius: 0

  widgets:
    - obj:
        x: 0
        y: 0
        width: 80
        height: 80
        bg_opa: 0
        border_width: 0
        pad_all: 4
        widgets:
          - button:
              width: 100%
              height: 100%
              radius: 12
              border_width: 0
              bg_color: 0x222222
              pad_all: 0
              on_click:
                - lvgl.page.show: page_1
              widgets:
                - label:
                    align: center
                    text: "1"

