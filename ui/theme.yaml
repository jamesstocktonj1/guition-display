---
# Color theme
#
# These are defaults. Override any value in main.yaml's substitutions section —
# main config substitutions always take precedence over package substitutions.
#
# Example override in main.yaml:
#   substitutions:
#     color_primary: "0x00AA88"   # swap orange for teal

substitutions:

  # -------------------------------------------
  # Core palette
  # -------------------------------------------
  color_primary:    "0x1565C0"   # deep blue  — main accent
  color_secondary:  "0x1976D2"   # medium blue — secondary accent
  color_bg:         "0xFFFFFF"   # page background (white)
  color_surface:    "0xDDE8F5"   # button / card resting surface (pale blue-grey)
  color_text:       "0x1A1A2E"   # primary text (dark blue-black)
  color_text_muted: "0x6B7280"   # dimmed text / off-state labels
  color_icon_on:    "0xFFFFFF"   # icon accent when active (white on coloured button)

  # -------------------------------------------
  # Primary button variant (default)
  # Used by switch_button.yaml automatically.
  # -------------------------------------------
  button_on_color:  "0x1565C0"   # color_primary
  button_off_color: "0xDDE8F5"   # color_surface
  icon_on_color:    "0xFFFFFF"   # color_icon_on
  icon_off_color:   "0x6B7280"   # color_text_muted
  label_on_color:   "0xFFFFFF"   # color_text (white on coloured button)
  label_off_color:  "0x6B7280"   # color_text_muted

  # -------------------------------------------
  # Secondary button variant
  # Pass these as vars overrides in your package include:
  #
  #   my_scene: !include
  #     file: components/buttons/switch_button.yaml
  #     vars:
  #       uid:             my_scene
  #       button_on_color: $btn_secondary_on
  #       icon_on_color:   $btn_secondary_icon_on
  #       label_on_color:  $btn_secondary_label_on
  # -------------------------------------------
  btn_secondary_on:       "0x1976D2"   # color_secondary (medium blue)
  btn_secondary_icon_on:  "0xFFFFFF"   # white
  btn_secondary_label_on: "0xFFFFFF"   # white

  # -------------------------------------------
  # Icon font
  # Override icon_font in main.yaml to swap to a different size.
  # -------------------------------------------
  icon_font:        mdi_16
  icon_font_large:  mdi_32
  value_font_large: roboto_24

  # -------------------------------------------
  # Icon aliases — use these instead of raw unicode codepoints.
  # Add new entries here as you add glyphs to config/hardware.yaml.
  # -------------------------------------------
  icon_lightbulb:   "\U000F0335"
  icon_thermometer: "\U000F050F"
  icon_flash:       "\U000F140B"
  icon_waveform:    "\U000F1480"
