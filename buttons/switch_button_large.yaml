---
# Large toggle button (2×2 cells = 160×160px) — tracks a HA binary entity and toggles on click.
#
# Required vars:
#   uid:       Unique ID, no spaces
#   page_id:   Target page (page_1 … page_6)
#   x:         Horizontal position (use $grid_col_0 … $grid_col_4)
#   y:         Vertical position   (use $grid_row_1 … $grid_row_4)
#   text:      Label shown on the button
#   icon:      Icon character (e.g. $icon_lightbulb)
#   entity_id: Home Assistant entity ID to toggle (light.*, switch.*, etc.)
#
# Note: a 2×2 button occupies 2 columns and 2 rows.
#   Max x: $grid_col_4  (col_5 would overflow the right edge)
#   Max y: $grid_row_4  (row_5 + 160px would overflow the tab bar)

lvgl:
  pages:
    - id: !extend ${page_id | default("page_1")}
      widgets:
        - container:
            id: ${uid}
            x: ${x}
            y: ${y}
            width: $grid_cell_size_2x
            height: $grid_cell_size_2x
            bg_opa: 0
            border_width: 0
            pad_all: 4
            widgets:
              - button:
                  id: button_${uid}
                  width: 100%
                  height: 100%
                  pad_all: 16
                  radius: 16
                  widgets:
                    - label:
                        id: icon_${uid}
                        align: center
                        y: -20
                        text_font: $icon_font_large
                        text: ${icon}

                    - label:
                        id: label_${uid}
                        align: bottom_mid
                        width: 100%
                        long_mode: wrap
                        text_align: center
                        text: ${text}

                  on_short_click:
                    - homeassistant.action:
                        action: homeassistant.toggle
                        data:
                          entity_id: ${entity_id}

binary_sensor:
  - id: sensor_${uid}
    platform: homeassistant
    entity_id: ${entity_id}
    trigger_on_initial_state: true
    on_state:
      - if:
          condition:
            binary_sensor.is_on: sensor_${uid}
          then:
            - lvgl.widget.update:
                id: button_${uid}
                bg_color: $button_on_color
            - lvgl.widget.update:
                id: icon_${uid}
                text_color: $icon_on_color
            - lvgl.widget.update:
                id: label_${uid}
                text_color: $label_on_color
          else:
            - lvgl.widget.update:
                id: button_${uid}
                bg_color: $button_off_color
            - lvgl.widget.update:
                id: icon_${uid}
                text_color: $icon_off_color
            - lvgl.widget.update:
                id: label_${uid}
                text_color: $label_off_color
