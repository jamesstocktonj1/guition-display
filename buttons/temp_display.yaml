---
# Temperature display — reads current_temperature from a HA climate entity.
#
# Required vars:
#   uid:       Unique ID, no spaces (e.g. living_room_temp)
#   page_id:   Target page (page_1 … page_6)
#   row:       Grid row (1–5). Row 0 is reserved for the tab bar.
#   column:    Grid column (0–5)
#   text:      Room name shown at the bottom
#   entity_id: Home Assistant climate entity (climate.*)
#
# Optional vars:
#   row_span:    default 1
#   column_span: default 1

lvgl:
  pages:
    - id: !extend ${page_id | default("page_1")}
      widgets:
        - container:
            id: ${uid}
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(1)}
            grid_cell_column_span: ${column_span | default(1)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            bg_opa: 0
            border_width: 0
            pad_all: 4
            widgets:
              - obj:
                  width: 100%
                  height: 100%
                  radius: 12
                  bg_color: $color_surface
                  border_width: 0
                  pad_all: 8
                  widgets:
                    - label:
                        id: icon_${uid}
                        align: left_mid
                        y: -8
                        text_font: mdi_24
                        text_color: $color_primary
                        text: "\U000F050F"  # mdi:thermometer

                    - label:
                        id: temp_${uid}
                        align: right_mid
                        y: -8
                        text_color: $color_text
                        text: "--°"

                    - label:
                        id: label_${uid}
                        align: bottom_mid
                        width: 100%
                        long_mode: wrap
                        text_align: center
                        text_color: $color_text_muted
                        text: ${text}

sensor:
  - id: sensor_${uid}
    platform: homeassistant
    entity_id: ${entity_id}
    attribute: current_temperature
    on_value:
      - lvgl.label.update:
          id: temp_${uid}
          text:
            format: "%.1f°"
            args: [x]
