---
# Toggle button — tracks a Home Assistant binary entity and toggles it on click.
#
# Required vars:
#   uid:       Unique ID, no spaces (e.g. kitchen_light). Must be unique per button.
#   page_id:   Target page (page_1 … page_6)
#   row:       Grid row (1–5). Row 0 is reserved for the tab bar.
#   column:    Grid column (0–5)
#   text:      Label shown on the button
#   icon:      Icon character (e.g. "\uF335" for mdi:lightbulb)
#   entity_id: Home Assistant entity ID to toggle (light.*, switch.*, etc.)
#
# Optional vars:
#   row_span:    default 1
#   column_span: default 1

lvgl:
  pages:
    - id: !extend ${page_id | default("page_1")}
      widgets:
        - container:
            id: ${uid}
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(1)}
            grid_cell_column_span: ${column_span | default(1)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            bg_opa: 0
            border_width: 0
            pad_all: 4
            widgets:
              - button:
                  id: button_${uid}
                  width: 100%
                  height: 100%
                  pad_all: 8
                  radius: 12
                  widgets:
                    - label:
                        id: icon_${uid}
                        align: top_mid
                        text_font: mdi_24
                        text: ${icon}

                    - label:
                        id: label_${uid}
                        align: bottom_mid
                        width: 100%
                        long_mode: wrap
                        text_align: center
                        text: ${text}

                  on_short_click:
                    - homeassistant.action:
                        action: homeassistant.toggle
                        data:
                          entity_id: ${entity_id}

binary_sensor:
  - id: sensor_${uid}
    platform: homeassistant
    entity_id: ${entity_id}
    trigger_on_initial_state: true
    on_state:
      - if:
          condition:
            binary_sensor.is_on: sensor_${uid}
          then:
            - lvgl.widget.update:
                id: button_${uid}
                bg_color: $button_on_color
            - lvgl.widget.update:
                id: icon_${uid}
                text_color: $icon_on_color
            - lvgl.widget.update:
                id: label_${uid}
                text_color: $label_on_color
          else:
            - lvgl.widget.update:
                id: button_${uid}
                bg_color: $button_off_color
            - lvgl.widget.update:
                id: icon_${uid}
                text_color: $icon_off_color
            - lvgl.widget.update:
                id: label_${uid}
                text_color: $label_off_color
