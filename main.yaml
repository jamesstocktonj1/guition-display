# -------------------------------------------
# LVGL pages — plain backgrounds, no grid layout.
# Status bar and tab bar live in top_layer (persistent across all pages).
# Row/column positions come from ui/grid.yaml substitutions.
# -------------------------------------------
lvgl:
  top_layer:
    widgets:
      - !include ui/status_bar.yaml
      - !include ui/tab_bar.yaml

  pages:
    - id: page_1
      bg_color: $color_bg
      pad_all: 0

    - id: page_2
      bg_color: $color_bg
      pad_all: 0

    - id: page_3
      bg_color: $color_bg
      pad_all: 0

    - id: page_4
      bg_color: $color_bg
      pad_all: 0

    - id: page_5
      bg_color: $color_bg
      pad_all: 0

    - id: page_6
      bg_color: $color_bg
      pad_all: 0
