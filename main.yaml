---
esphome:
  name: guition-display
  friendly_name: Guition Display
  min_version: 2026.3.0

# -------------------------------------------
# Theme overrides (optional)
# Any substitution defined here takes precedence over ui/theme.yaml.
# e.g. to change the primary accent colour:
#   substitutions:
#     color_primary: "0x00AA88"
# -------------------------------------------

packages:
  hardware: !include config/hardware.yaml
  wifi:     !include config/wifi.yaml
  theme:    !include ui/theme.yaml
  grid:     !include ui/grid.yaml
  # -------------------------------------------
  # Buttons
  # -------------------------------------------
  table_lamp: !include
    file: buttons/switch_button_large.yaml
    vars:
      uid:       table_lamp
      page_id:   page_1
      x:         $grid_col_0
      y:         $grid_row_1
      text:      "Table Lamp"
      icon:      $icon_lightbulb
      entity_id: "light.table_lamp"

  james_temp: !include
    file: buttons/temp_display_large.yaml
    vars:
      uid:       james_temp
      page_id:   page_1
      x:         $grid_col_2
      y:         $grid_row_1
      text:      "James"
      entity_id: "climate.james"

  ac_power_1: !include
    file: buttons/power_display_large.yaml
    vars:
      uid:       ac_power_1
      page_id:   page_1
      x:         $grid_col_4
      y:         $grid_row_1
      text:      "AC Power"
      entity_id: "sensor.xiao_2_channel_wi_fi_ac_energy_meter_106814_bl0939_active_power_1"

  # -------------------------------------------
  # Page 6 — test fill (6×5 grid)
