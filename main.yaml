---
esphome:
  name: guition-display
  friendly_name: Guition Display
  min_version: 2026.3.0

# -------------------------------------------
# Theme overrides (optional)
# Any substitution defined here takes precedence over ui/theme.yaml.
# e.g. to change the primary accent colour:
#   substitutions:
#     color_primary: "0x00AA88"
# -------------------------------------------

packages:
  hardware: !include config/hardware.yaml
  wifi:     !include config/wifi.yaml
  theme:    !include ui/theme.yaml
  grid:     !include ui/grid.yaml
  # -------------------------------------------
  # Pages
  # -------------------------------------------
  page_1: !include pages/page_1.yaml
  page_2: !include pages/page_2.yaml
  page_3: !include pages/page_3.yaml
  page_6: !include pages/page_6.yaml

# -------------------------------------------
# LVGL pages — plain backgrounds, no grid layout.
# Status bar and tab bar live in top_layer (persistent across all pages).
# Row/column positions come from ui/grid.yaml substitutions.
# -------------------------------------------
lvgl:
  top_layer:
    widgets:
      - !include ui/status_bar.yaml
      - !include ui/tab_bar.yaml

  pages:
    - id: page_1
      bg_color: $color_bg
      pad_all: 0

    - id: page_2
      bg_color: $color_bg
      pad_all: 0

    - id: page_3
      bg_color: $color_bg
      pad_all: 0

    - id: page_4
      bg_color: $color_bg
      pad_all: 0

    - id: page_5
      bg_color: $color_bg
      pad_all: 0

    - id: page_6
      bg_color: $color_bg
      pad_all: 0
