---
# Large slider button (2×2 cells = 160×160px) — controls brightness of a HA light via vertical swipe.
# Drag up to increase brightness; the blue fill shows current level.
#
# Required vars:
#   uid:       Unique ID, no spaces
#   page_id:   Target page (page_1 … page_6)
#   x:         Horizontal position (use $grid_col_0 … $grid_col_4)
#   y:         Vertical position   (use $grid_row_1 … $grid_row_4)
#   text:      Label shown on the button
#   icon:      Icon character (e.g. $icon_lightbulb)
#   entity_id: Home Assistant light entity ID (light.*)
#
# Note: a 2×2 button occupies 2 columns and 2 rows.
#   Max x: $grid_col_4  (col_5 would overflow the right edge)
#   Max y: $grid_row_4  (row_5 + 160px would overflow the tab bar)

lvgl:
  pages:
    - id: !extend ${page_id | default("page_1")}
      widgets:
        - container:
            id: ${uid}
            x: ${x}
            y: ${y}
            width: $grid_cell_size_2x
            height: $grid_cell_size_2x
            bg_opa: 0
            border_width: 0
            pad_all: 4
            widgets:
              # 1. Grey background card (bottom layer)
              - obj:
                  width: 100%
                  height: 100%
                  radius: 16
                  bg_color: $button_off_color
                  border_width: 0
              # 2. Slider (middle layer — labels above are non-clickable so touch falls through)
              - slider:
                  id: slider_${uid}
                  # height > width forces LVGL vertical mode (drag up = brighter)
                  align: center
                  width: 150
                  height: 152
                  min_value: 0
                  max_value: 255
                  value: 0
                  radius: 16
                  bg_opa: TRANSP
                  border_width: 0
                  indicator:
                    bg_color: $color_primary
                    bg_opa: COVER
                    radius: 16
                  knob:
                    bg_opa: TRANSP
                    border_opa: TRANSP
                    pad_all: 0
                    width: 0
                    height: 0
                  on_value:
                    - globals.set:
                        id: brightness_${uid}
                        value: !lambda return x;
                    - script.execute: debounce_brightness_${uid}
                    - if:
                        condition:
                          lambda: return x > 33;
                        then:
                          - lvgl.label.update:
                              id: label_${uid}
                              text_color: $color_icon_on
                        else:
                          - lvgl.label.update:
                              id: label_${uid}
                              text_color: $label_off_color
                    - if:
                        condition:
                          lambda: return x > 161;
                        then:
                          - lvgl.label.update:
                              id: icon_${uid}
                              text_color: $color_icon_on
                        else:
                          - lvgl.label.update:
                              id: icon_${uid}
                              text_color: $icon_off_color
              # 3 & 4. Labels on top — LVGL labels are non-clickable by default so
              #         touch events fall through to the slider below
              - label:
                  id: icon_${uid}
                  align: center
                  y: -20
                  text_font: $icon_font_large
                  text: ${icon}
                  text_color: $icon_off_color
                  bg_opa: 0
              - label:
                  id: label_${uid}
                  align: bottom_mid
                  y: -12
                  width: 100%
                  long_mode: wrap
                  text_align: center
                  text: ${text}
                  text_color: $label_off_color
                  bg_opa: 0

globals:
  - id: brightness_${uid}
    type: int
    initial_value: '0'

script:
  - id: debounce_brightness_${uid}
    mode: restart
    then:
      - delay: 100ms
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: ${entity_id}
            brightness: !lambda return id(brightness_${uid});

sensor:
  - id: sensor_${uid}
    platform: homeassistant
    entity_id: ${entity_id}
    attribute: brightness
    filters:
      - filter_out: nan
    on_value:
      - lvgl.slider.update:
          id: slider_${uid}
          value: !lambda return (int)x;
      - if:
          condition:
            lambda: return x > 33;
          then:
            - lvgl.label.update:
                id: label_${uid}
                text_color: $color_icon_on
          else:
            - lvgl.label.update:
                id: label_${uid}
                text_color: $label_off_color
      - if:
          condition:
            lambda: return x > 161;
          then:
            - lvgl.label.update:
                id: icon_${uid}
                text_color: $color_icon_on
          else:
            - lvgl.label.update:
                id: icon_${uid}
                text_color: $icon_off_color
