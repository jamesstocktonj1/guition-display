---
packages:
  p1_home_temp: !include
    file: ../components/display/temp_display_large.yaml
    vars:
      uid:       p1_home_temp
      page_id:   page_1
      x:         $grid_col_0
      y:         $grid_row_1
      text:      "Home"
      entity_id: "climate.home"

  p1_total_power: !include
    file: ../components/display/power_display_large.yaml
    vars:
      uid:       p1_total_power
      page_id:   page_1
      x:         $grid_col_2
      y:         $grid_row_1
      text:      "AC Power"
      entity_id: "sensor.total_power"

  p1_total_current: !include
    file: ../components/display/current_display_large.yaml
    vars:
      uid:       p1_total_current
      page_id:   page_1
      x:         $grid_col_4
      y:         $grid_row_1
      text:      "AC Current"
      entity_id: "sensor.total_current"

  p1_backlight: !include
    file: ../components/buttons/switch_button_large.yaml
    vars:
      uid:       p1_backlight
      page_id:   page_1
      x:         $grid_col_0
      y:         $grid_row_2
      text:      "Backlight"
      icon:      $icon_lightbulb
      entity_id: "light.guition_4848s040_display_backlight"

  snug_lamp: !include
    file: ../components/buttons/switch_button_large.yaml
    vars:
      uid:       snug_lamp
      page_id:   page_1
      x:         $grid_col_2
      y:         $grid_row_2
      text:      "Snug Light"
      icon:      $icon_lightbulb
      entity_id: "light.snug_outlet_snug_light"

  table_lamp: !include
    file: ../components/buttons/slider_button_large.yaml
    vars:
      uid:       table_lamp
      page_id:   page_1
      x:         $grid_col_4
      y:         $grid_row_2
      text:      "Table Lamp"
      icon:      $icon_lightbulb
      entity_id: "light.table_lamp"

  p1_kitchen_temp: !include
    file: ../components/display/temp_display_large.yaml
    vars:
      uid:       p1_kitchen_temp
      page_id:   page_1
      x:         $grid_col_0
      y:         $grid_row_4
      text:      "Kitchen"
      entity_id: "climate.kitchen"

  p1_snug_temp: !include
    file: ../components/display/temp_display_large.yaml
    vars:
      uid:       p1_snug_temp
      page_id:   page_1
      x:         $grid_col_2
      y:         $grid_row_4
      text:      "Snug"
      entity_id: "climate.snug"

  p1_bedroom_temp: !include
    file: ../components/display/temp_display_large.yaml
    vars:
      uid:       p1_bedroom_temp
      page_id:   page_1
      x:         $grid_col_4
      y:         $grid_row_4
      text:      "Master Bedroom"
      entity_id: "climate.master_bed"
